name: Scraper Horarios 1ª RFEF

on:
  # Ejecutar dos veces al día
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC = 10:00 Madrid
    - cron: '0 20 * * *'  # 20:00 UTC = 22:00 Madrid

  # Lanzar manualmente desde GitHub con parámetros
  workflow_dispatch:
    inputs:
      jornada:
        description: 'Número de jornada'
        required: true
        default: '1'
      dry_run:
        description: 'Solo mostrar, no escribir en Supabase'
        type: boolean
        default: false
      url_manual:
        description: 'URL manual (opcional, para pruebas)'
        required: false

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests anthropic

      - name: Ejecutar scraper
        working-directory: scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          ARGS="--jornada ${{ github.event.inputs.jornada || '1' }}"
          
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          
          if [ -n "${{ github.event.inputs.url_manual }}" ]; then
            ARGS="$ARGS --url ${{ github.event.inputs.url_manual }}"
          fi
          
          python scraper.py $ARGS
