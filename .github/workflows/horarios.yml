name: Scraper Horarios 1ª RFEF

on:
  schedule:
    - cron: '*/15 7-21 * * *'

  workflow_dispatch:
    inputs:
      jornada:
        description: 'Número de jornada'
        required: true
        default: '1'
      dry_run:
        description: 'Solo mostrar, no escribir en Supabase'
        type: boolean
        default: false
      url_manual:
        description: 'URL de la página (opcional)'
        required: false
      imagenes_manual:
        description: 'URLs de imágenes separadas por coma (opcional)'
        required: false

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar scraper
        working-directory: scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          ARGS="--jornada ${{ github.event.inputs.jornada || '1' }}"

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ -n "${{ github.event.inputs.url_manual }}" ]; then
            ARGS="$ARGS --url ${{ github.event.inputs.url_manual }}"
          fi

          if [ -n "${{ github.event.inputs.imagenes_manual }}" ]; then
            ARGS="$ARGS --imagenes ${{ github.event.inputs.imagenes_manual }}"
          fi

          python scraper.py $ARGS
